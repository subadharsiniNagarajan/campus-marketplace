<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sell – CampusMart</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <nav class="navbar">
    <div class="logo">Campus<span>Mart</span></div>
    <div class="nav-links">
      <a href="dashboard.html">🏠 Home</a>
      <a href="sell.html" class="active">📦 Sell</a>
      <a href="buy.html">🛒 Buy</a>
    </div>
    <div class="nav-user">
      <div class="avatar" id="avatar-initials">?</div>
      <span id="nav-username">Student</span>
      <button class="btn btn-danger" onclick="logout()" style="padding:0.4rem 0.9rem; font-size:0.85rem;">Logout</button>
    </div>
  </nav>

  <div class="page-container">
    <div class="page-header">
      <h2>📦 List an Item for Sale</h2>
      <p>Fill in the details below to list your item for fellow students.</p>
    </div>

    <div class="sell-card">
      <div id="sell-alert" class="alert"></div>

      <form id="sell-form" onsubmit="handleSell(event)" enctype="multipart/form-data">
        <div class="form-row">
          <div class="form-group">
            <label>Item Name *</label>
            <input type="text" id="item-name" placeholder="e.g. Engineering Physics Book" required />
          </div>
          <div class="form-group">
            <label>Category *</label>
            <select id="item-category" required>
              <option value="">Select category</option>
              <option value="Books">📚 Books</option>
              <option value="Calculator">🔢 Calculator</option>
              <option value="Notes">📝 Notes</option>
              <option value="Lab Materials">🔬 Lab Materials</option>
            </select>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>Subject / Department *</label>
            <input type="text" id="item-subject" placeholder="e.g. Physics, CSE, Maths" required />
          </div>
          <div class="form-group">
            <label>Price (₹) *</label>
            <input type="number" id="item-price" placeholder="e.g. 150" min="1" required />
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>Condition *</label>
            <select id="item-condition" required>
              <option value="">Select condition</option>
              <option value="New">✨ New</option>
              <option value="Good">👍 Good</option>
              <option value="Used">📖 Used</option>
            </select>
          </div>
          <div class="form-group">
            <label>Contact (Phone / WhatsApp) *</label>
            <input type="text" id="item-contact" placeholder="e.g. +91 9876543210" required />
          </div>
        </div>

        <div class="form-group">
          <label>Description</label>
          <textarea id="item-description" placeholder="Describe the item, edition, any damage, etc."></textarea>
        </div>

        <div class="form-group">
          <label>Item Image</label>
          <div class="image-upload-area" id="upload-area">
            <input type="file" id="item-image" accept="image/*" onchange="previewImage(event)" />
            <div class="upload-icon">📷</div>
            <p>Click to upload an image (max 5MB)</p>
          </div>
          <div class="image-preview" id="image-preview">
            <img id="preview-img" src="" alt="Preview" />
          </div>
        </div>

        <button type="submit" class="btn btn-primary btn-full" id="sell-btn">
          🚀 List Item for Sale
        </button>
      </form>
    </div>
  </div>

  <script src="script.js"></script>
  <script>
    requireAuth();
    const user = getUser();
    document.getElementById('nav-username').textContent = user.name;
    document.getElementById('avatar-initials').textContent = user.name.charAt(0).toUpperCase();
  </script>
</body>
</html>
