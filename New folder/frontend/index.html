<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CampusMart – College Marketplace</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-header">
        <div class="brand">Campus<span>Mart</span></div>
        <p>Your student-to-student marketplace</p>
      </div>

      <div class="auth-tabs">
        <div class="auth-tab active" id="tab-login" onclick="switchTab('login')">Login</div>
        <div class="auth-tab" id="tab-signup" onclick="switchTab('signup')">Sign Up</div>
      </div>

      <div id="alert" class="alert"></div>

      <!-- Login Form -->
      <form id="login-form" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label>College Email</label>
          <input type="email" id="login-email" placeholder="you@college.edu" required />
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="login-password" placeholder="Enter your password" required />
        </div>
        <button type="submit" class="btn btn-primary btn-full" id="login-btn">
          Login
        </button>
        <p style="text-align:center; margin-top:1rem; color:var(--text-muted); font-size:0.88rem;">
          Don't have an account? <a href="#" onclick="switchTab('signup')" style="color:var(--primary); font-weight:600;">Sign up</a>
        </p>
      </form>

      <!-- Signup Form -->
      <form id="signup-form" style="display:none;" onsubmit="handleSignup(event)">
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" id="signup-name" placeholder="Your full name" required />
        </div>
        <div class="form-group">
          <label>College Email</label>
          <input type="email" id="signup-email" placeholder="you@college.edu" required />
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="signup-password" placeholder="Min. 6 characters" required />
        </div>
        <button type="submit" class="btn btn-primary btn-full" id="signup-btn">
          Create Account
        </button>
        <p style="text-align:center; margin-top:1rem; color:var(--text-muted); font-size:0.88rem;">
          Already have an account? <a href="#" onclick="switchTab('login')" style="color:var(--primary); font-weight:600;">Login</a>
        </p>
      </form>

      <p style="text-align:center; margin-top:1.5rem; font-size:0.78rem; color:var(--text-muted);">
        🔒 Only college email addresses are accepted
      </p>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
